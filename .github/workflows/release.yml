name: build-release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   name: macOS }
          - { os: windows-latest, name: Windows }
          - { os: ubuntu-latest,  name: Linux }
    steps:
      - uses: actions/checkout@v4

      # SDL2 is built from source; on Linux its backends need these headers.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxss-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libasound2-dev libpulse-dev libdbus-1-dev libudev-dev

      # Cache the compiled SDL2 (FetchContent _deps) to avoid rebuilding it
      # from source on every run.
      - name: Cache SDL2 build
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-sdl-release-2.32.10

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package
        working-directory: build
        run: cpack -C Release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gba_emu-${{ matrix.name }}
          path: |
            build/*.dmg
            build/*.zip
            build/*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
